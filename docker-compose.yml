services:
  script-sidecar:
    build: ./script-sidecar
    environment:
      HOST: 0.0.0.0
      PORT: 9111
    expose:
      - "9111"

  backend:
    build: ./backend
    environment:
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY in your environment or .env}
      DATABASE_URL: sqlite:////data/postman_clone.db
      SCRIPT_SIDECAR_URL: http://script-sidecar:9111
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
    depends_on:
      - script-sidecar

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend-data:
